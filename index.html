<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CertVault - Login</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="particles" id="particles"></div>

  <header class="header">
    <div class="logo"><i class="fas fa-certificate"></i> CertVault</div>
  </header>

  <div class="login-container">
    <div class="login-card">
      <h2>Login to CertVault</h2>
      <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPass" placeholder="Password" required>
        <button type="submit" class="btn">Login</button>
      </form>
      <p>New here? <span onclick="alert('Register coming soon! Demo kosam any email use chey')">Register</span></p>
    </div>
  </div>

  <footer class="footer">© 2026 CertVault • Andhra Pradesh</footer>
  <script src="script.js"></script>
</body>
</html>
